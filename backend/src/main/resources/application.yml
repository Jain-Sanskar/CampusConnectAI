spring:
  application:
    name: campusconnect-ai

  datasource:
    # Local-dev defaults; override via environment variables in any real deployment.
    url: ${DB_URL:jdbc:mysql://localhost:3306/campusconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    # default seed admin for local dev - override both in any real deployment
    email: ${ADMIN_EMAIL:admin@campusconnect.com}
    password: ${ADMIN_PASSWORD:Admin@123}

# The secret below is a base64 dev placeholder only. ALWAYS override JWT_SECRET in real environments.
jwt:
  secret: ${JWT_SECRET:ZHVtbXktZGV2LXNlY3JldC1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbi1jYW1wdXNjb25uZWN0LWFpLTEyMzQ1Ng==}
  expiration: ${JWT_EXPIRATION:86400000}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:20}

chat:
  # how many days of inactive conversations to keep before the cleanup job flushes them
  retention-days: ${CHAT_RETENTION_DAYS:7}
  # default: run daily at 03:00
  cleanup-cron: ${CHAT_CLEANUP_CRON:0 0 3 * * *}

logging:
  level:
    com.campusconnect: INFO
    org.springframework.security: INFO
